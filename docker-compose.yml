services:
  qdrant:
    image: qdrant/qdrant
    container_name: fm_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./storage/qdrant:/qdrant/storage
    networks:
      - fm_back_vector

  api-service:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    container_name: fm_api_service
    restart: unless-stopped
    env_file:
      - ./api-service/.env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      AI_SERVICE_BASE_URL: http://attendance-service:8001
      DATABASE_URL: postgresql+asyncpg://postgres:Facematching123*@postgres:5432/Face_Recognition
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: Face_Recognition
      DATABASE_USER: postgres
      DATABASE_PASSWORD: "Facematching123*"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fm_back_vector

  attendance-service:
    build:
      context: ./attendance-service
      dockerfile: Dockerfile
    container_name: fm_attendance_service
    restart: unless-stopped
    runtime: nvidia
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./attendance-service/.env
    environment:
      AI_SERVER_HOST: 0.0.0.0
      AI_SERVICE_PORT: 8001
      API_SERVER_BASE_URL: http://api-service:8000
      STREAM_URL: http://host.docker.internal:8080/stream
      HOST_QDRANT: qdrant
      PORT_QDRANT: 6333
      URL_QDRANT: http://qdrant:6333
      ML_DEVICE: 0
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      ATTENDANCE_ENABLED: "True"
      ATTENDANCE_PROCESS_FPS: 8
    ports:
      - "8001:8001"
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - fm_back_vector

  postgres:
    image: postgres:16-alpine
    container_name: fm_db
    restart: unless-stopped
    command: ["postgres", "-c", "timezone=Asia/Ho_Chi_Minh"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "Facematching123*"
      POSTGRES_DB: Face_Recognition
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fm_back_vector

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - fm_back_vector

networks:
  fm_back_vector:
    driver: bridge

volumes:
  redis_data:
